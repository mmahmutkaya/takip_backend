databases:
  - name: takip-db
    databaseName: takip_db
    user: takip_user
    plan: free

services:
  - type: web
    name: takip-backend
    runtime: node
    plan: free
    branch: master
    autoDeploy: true
    healthCheckPath: /
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: npx prisma migrate deploy && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: takip-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        value: https://takip-web.onrender.com
      - key: APP_URL
        value: https://takip-web.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: '"Takip" <noreply@takip.app>'
